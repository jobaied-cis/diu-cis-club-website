<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIS Club - Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- ===== NAVBAR ===== -->
    <header class="navbar">
        <div class="logo">
            <img src="daffodil-logo.jpg" class="daffodil-logo">
            <img src="cis-logo.jpg" class="cis-logo">
        </div>

        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="events.html">Events</a>
            <a href="members.html">Join</a>
            <a href="resources.html">Resources</a>
            <a href="gallery.html" class="active">Gallery</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <!-- ===== HERO ===== -->
    <section class="gallery-hero">
        <h1>CIS Club Gallery</h1>
        <p>Explore Moments from our Events, Workshops, Cultural & Sports Programs.</p>
    </section>

    <!-- ===== GALLERY GRID ===== -->
    <section class="gallery-section">
        <h2>Our Moments</h2>

        <div class="gallery-grid">

            <!-- Sample Images (Replace with your own) -->
            <img src="g1.jpg" class="gallery-img fade-slide" alt="Event 1">
            <img src="g2.jpg" class="gallery-img fade-slide" alt="Event 2">
            <img src="g3.jpg" class="gallery-img fade-slide" alt="Event 3">
            <img src="g4.jpg" class="gallery-img fade-slide" alt="Event 4">
            <img src="g5.jpg" class="gallery-img fade-slide" alt="Event 5">
            <img src="g6.jpg" class="gallery-img fade-slide" alt="Event 6">
            <img src="g7.jpg" class="gallery-img fade-slide" alt="Event 7">
            <img src="g8.jpg" class="gallery-img fade-slide" alt="Event 8">
            <img src="g9.jpg" class="gallery-img fade-slide" alt="Event 9">
            <img src="g10.jpg" class="gallery-img fade-slide" alt="Event 10">
            <img src="g11.jpg" class="gallery-img fade-slide" alt="Event 11">
            <img src="g12.jpg" class="gallery-img fade-slide" alt="Event 12">
            <img src="g13.jpg" class="gallery-img fade-slide" alt="Event 13">
            <img src="g14.jpg" class="gallery-img fade-slide" alt="Event 14">
            <img src="g15.jpg" class="gallery-img fade-slide" alt="Event 15">
            <img src="g16.jpg" class="gallery-img fade-slide" alt="Event 16">

        </div>
    </section>

    <!-- ===== LIGHTBOX (POPUP IMAGE VIEW) ===== -->
    <div id="lightbox" class="lightbox">
        <span class="close-lightbox">&times;</span>
        <img id="lightbox-img">
    </div>

    <!-- ===== FOOTER ===== -->
    <footer>
        <p>© 2025 DIU CIS CLUB WEBSITE | Developed by Jobaied Chowdhury Akash</p>
    </footer>

    <script src="app.js"></script>
</body>

</html>
